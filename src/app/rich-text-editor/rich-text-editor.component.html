<div class="editor-frame" [class.is-disabled]="disabled">
  <div class="toolbar" aria-label="Formatting toolbar">
    <button
      type="button"
      class="tool-button"
      [class.active]="isActive('paragraph')"
      (click)="setParagraph()"
    >
      P
    </button>
    <button
      type="button"
      class="tool-button"
      [class.active]="isActive('bold')"
      (click)="toggleBold()"
    >
      <strong>B</strong>
    </button>
    <button
      type="button"
      class="tool-button"
      [class.active]="isActive('italic')"
      (click)="toggleItalic()"
    >
      <em>I</em>
    </button>
    <button
      type="button"
      class="tool-button"
      [class.active]="isActive('heading', { level: 1 })"
      (click)="toggleHeading(1)"
    >
      H1
    </button>
    <button
      type="button"
      class="tool-button"
      [class.active]="isActive('heading', { level: 2 })"
      (click)="toggleHeading(2)"
    >
      H2
    </button>
    <button
      type="button"
      class="tool-button"
      [class.active]="isActive('heading', { level: 3 })"
      (click)="toggleHeading(3)"
    >
      H3
    </button>
    <button
      type="button"
      class="tool-button"
      [class.active]="isActive('bulletList')"
      (click)="toggleBulletList()"
    >
      • List
    </button>
    <button
      type="button"
      class="tool-button"
      [class.active]="isActive('orderedList')"
      (click)="toggleOrderedList()"
    >
      1. List
    </button>
    <button type="button" class="tool-button" (click)="addHorizontalRule()">
      Rule
    </button>
  </div>

  <div class="editor-scroll">
    <div #editorHost class="editor-host"></div>
  </div>
</div>
